<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservations | Booking System</title>

    <!-- ✅ Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: "#e10e49",
                            light: "#ffffff",
                            dark: "#1e1e1e",
                            blue: "#263f6a",
                            green: "#284e36",
                            orange: "#e37222",
                            rose: "#c24d52",
                        }
                    }
                }
            }
        };
    </script>

    <!-- ✅ AUTH UI AS ES MODULE -->
    <script type="module">
        import { initAuthUI, logout } from "/js/auth-ui.js";
        window.logout = logout;     // ✅ Make logout global
        document.addEventListener("DOMContentLoaded", initAuthUI);
    </script>

    <!-- ✅ RESERVATIONS JS (normal script, not module) -->
    <script src="/js/reservations.js" defer></script>
</head>

<body class="min-h-screen flex flex-col bg-brand-light text-brand-dark">

    <!-- ✅ HEADER -->
    <header class="sticky top-0 z-40 bg-brand-dark text-white shadow-soft">
        <div class="max-w-7xl mx-auto px-6">
            <div class="h-16 flex items-center justify-between">

                <a href="/" class="flex items-center gap-3">
                    <img src="/logo.svg" class="h-10 w-10" />
                    <div class="leading-tight">
                        <div class="text-sm font-semibold">Booking System</div>
                        <div class="text-xs text-white/70">Secure resource booking</div>
                    </div>
                </a>

                <nav class="flex items-center gap-3">

                    <a href="/resources" data-auth="user"
                       class="auth-link hidden rounded-xl border border-white/20 px-4 py-2 text-sm hover:bg-white/10">
                        Resources
                    </a>

                    <a href="/reservations" data-auth="user"
                       class="auth-link hidden rounded-xl bg-brand-primary px-4 py-2 text-sm text-white">
                        Reservations
                    </a>

                    <a href="/register" data-auth="guest"
                       class="auth-link rounded-xl border border-white/20 px-4 py-2 text-sm hover:bg-white/10">
                        Register
                    </a>

                    <a href="/login" data-auth="guest"
                       class="auth-link rounded-xl border border-white/20 px-4 py-2 text-sm hover:bg-white/10">
                        Sign in
                    </a>

                    <button onclick="logout()" data-auth="user"
                        class="auth-link hidden rounded-xl bg-brand-primary px-4 py-2 text-sm text-white">
                        Sign out
                    </button>

                </nav>

            </div>
        </div>
    </header>

    <!-- ✅ MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-6 flex-grow">

        <section class="py-12">
            <div class="bg-white p-8 rounded-3xl shadow-soft">
                <span class="text-brand-blue bg-brand-blue/10 px-4 py-1 rounded-full text-sm font-semibold">
                    Reservations
                </span>
                <h1 class="text-3xl font-semibold mt-4">Manage Reservations</h1>
                <p class="text-sm mt-2">Create, update, or delete reservations after signing in.</p>
            </div>
        </section>

        <!-- ✅ GRID -->
        <section class="grid gap-8 lg:grid-cols-12 pb-16">

            <!-- ✅ FORM -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl p-8 shadow-soft">

                    <h2 class="text-xl font-semibold">Reservation Form</h2>

                    <div id="message"
                         class="hidden mt-6 border rounded-2xl px-4 py-3 text-sm"></div>

                    <form id="reservationForm" class="mt-8 space-y-6">

                        <input type="hidden" id="reservationId" />

                        <div>
                            <label class="text-sm font-semibold">Resource ID</label>
                            <input id="resourceId" type="number"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm" />
                        </div>

                        <div>
                            <label class="text-sm font-semibold">User ID</label>
                            <input id="userId" type="number"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm" />
                        </div>

                        <div>
                            <label class="text-sm font-semibold">Start Time</label>
                            <input id="startTime" type="datetime-local"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm" />
                        </div>

                        <div>
                            <label class="text-sm font-semibold">End Time</label>
                            <input id="endTime" type="datetime-local"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm" />
                        </div>

                        <div>
                            <label class="text-sm font-semibold">Note</label>
                            <input id="note" type="text"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm" />
                        </div>

                        <div>
                            <label class="text-sm font-semibold">Status</label>
                            <select id="status"
                                class="w-full mt-2 rounded-2xl border px-4 py-3 text-sm">
                                <option value="active">active</option>
                                <option value="cancelled">cancelled</option>
                            </select>
                        </div>

                        <div class="grid sm:grid-flow-col gap-4 mt-8">
                            <button id="createBtn"
                                class="bg-brand-primary px-4 py-3 rounded-2xl text-white text-sm font-semibold">
                                Create
                            </button>

                            <button type="button" id="updateBtn"
                                class="bg-brand-blue px-4 py-3 rounded-2xl text-white text-sm font-semibold">
                                Update
                            </button>

                            <button type="button" id="deleteBtn"
                                class="bg-brand-rose px-4 py-3 rounded-2xl text-white text-sm font-semibold">
                                Delete
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            <!-- ✅ LIST -->
            <aside class="lg:col-span-4">
                <div class="bg-white rounded-3xl p-6 shadow-soft">
                    <h3 class="font-semibold">Reservation List</h3>
                    <p class="text-xs mt-2">Click a reservation to load it.</p>

                    <div id="reservationList" class="mt-4 space-y-3"></div>
                </div>
            </aside>

        </section>

    </main>

    <footer class="bg-brand-dark text-white py-8 text-center text-sm">
        © Booking System
    </footer>

</body>
</html>
