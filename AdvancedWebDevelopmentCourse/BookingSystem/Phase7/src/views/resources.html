<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resources | Booking System</title>

    <!-- ✅ CORRECT TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: "#e10e49",
                            light: "#ffffff",
                            dark: "#1e1e1e",
                            blue: "#263f6a",
                            green: "#284e36",
                            orange: "#e37222",
                            rose: "#c24d52",
                        }
                    },
                    boxShadow: { soft: "0 8px 40px rgba(0,0,0,0.45)" }
                }
            }
        }
    </script>

    <!-- ✅ MUST BE MODULES (resources.js imports auth-ui.js) -->
    <script type="module" src="/js/auth-ui.js"></script>
    <script type="module" src="/js/resources.js"></script>
    <script type="module" src="/js/form.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-brand-light text-brand-dark">

<header class="sticky top-0 z-40 bg-brand-dark text-white shadow-soft">
    <div class="mx-auto max-w-7xl px-6">
        <div class="flex h-16 items-center justify-between">

            <a href="/" class="flex items-center gap-3 flex-1">
                <img src="logo.svg" class="h-10 w-10" />
                <div class="leading-tight">
                    <span class="text-sm font-semibold">Booking System</span>
                    <span class="text-xs text-white/70">Secure resource booking</span>
                </div>
            </a>

            <nav class="flex items-center gap-3">
                <a href="/resources" data-auth="user" class="auth-link hidden rounded-xl border px-4 py-2">Resources</a>
                <a href="/reservations" data-auth="user" class="auth-link hidden rounded-xl border px-4 py-2">Reservations</a>
                <a href="/register" data-auth="guest" class="auth-link rounded-xl border px-4 py-2">Register</a>
                <a href="/login" data-auth="guest" class="auth-link rounded-xl border px-4 py-2">Sign in</a>
                <button onclick="logout()" data-auth="user"
                    class="auth-link hidden rounded-xl bg-brand-primary px-4 py-2 text-white">Sign out</button>
            </nav>

        </div>
    </div>
</header>

<main id="mainContent" class="mx-auto max-w-7xl px-6 flex-grow">

    <section class="py-12">
        <div class="rounded-3xl bg-white p-8 shadow-soft">
            <span class="inline-flex items-center gap-2 rounded-full bg-brand-blue/10 px-4 py-1 text-sm font-semibold text-brand-blue">
                Resource management
            </span>
            <h1 class="mt-4 text-3xl font-semibold leading-tight">Resources</h1>
            <p class="mt-2 max-w-2xl text-sm text-black/70">
                As a manager, you can create, update, and delete resources.
            </p>
        </div>
    </section>

    <section class="pb-16">
        <div class="grid gap-8 lg:grid-cols-12">

            <!-- ✅ FORM -->
            <div class="lg:col-span-8">
                <div class="rounded-3xl bg-white p-8 shadow-soft">
                    <h2 class="text-xl font-semibold">Resource form</h2>

                    <div id="formMessage" class="hidden mt-6 rounded-2xl border px-4 py-3 text-sm"></div>

                    <form id="resourceForm" class="mt-8 space-y-6" novalidate>
                        <input type="hidden" id="resourceId" />

                        <div>
                            <label class="block text-sm font-semibold">Resource name</label>
                            <div id="resourceNameCnt"></div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold">Resource description</label>
                            <div id="resourceDescriptionCnt"></div>
                        </div>

                        <div class="grid gap-6 lg:grid-cols-3">
                            <div id="resourceAvailableCnt"></div>
                            <div id="resourcePriceCnt" class="lg:col-span-2"></div>
                        </div>

                        <div id="resourceActions"
                            class="mt-8 grid gap-4 w-full grid-cols-1 sm:grid-flow-col sm:auto-cols-fr"></div>
                    </form>
                </div>
            </div>

            <!-- ✅ LIST -->
            <aside class="lg:col-span-4 space-y-6">
                <div class="rounded-3xl bg-white p-6 shadow-soft">
                    <h3 class="font-semibold">Resource list</h3>
                    <p class="text-xs mt-2 text-black/50">Click an item to edit or delete.</p>
                    <div id="resourceList" class="mt-4 space-y-3"></div>
                </div>
            </aside>

        </div>
    </section>

</main>

<footer class="bg-brand-dark text-white py-8 text-center text-sm">
    © Booking System
</footer>

</body>
</html>
